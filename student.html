<body>

<script>
// 🔐 Login check
const isLoggedIn = localStorage.getItem("loggedIn");
if (!isLoggedIn) window.location.href = "login.html";
</script>

<div class="main center">

  <h1>Daily Check-in 🌿</h1>
  <p>Welcome, <span id="username"></span></p>

  <div class="checkin-box">

    <!-- QUESTIONS -->
    <div class="form-group"><label>😴Do you Wake up feeling rested?</label>

    <div class="form-group"><label>📲Do you use Phone as an escape?</label>
      <select><option>Never</option><option>Rarely</option><option>Sometimes</option><option>Often</option><option>Always</option></select>

      <select><option>Never</option><option>Rarely</option><option>Sometimes</option><option>Often</option><option>Always</option></select>
    </div>

    <div class="form-group"><label>😴 Do you Feel exhausted?</label>
      <select><option>Never</option><option>Rarely</option><option>Sometimes</option><option>Often</option><option>Always</option></select>
    </div>

    <button onclick="handleCheckin()">Submit 💙</button>

  </div>

  <br>
  <button onclick="logout()">Logout</button>

</div>

<script src="api.js"></script>

<script>
// 👤 Username
document.getElementById("username").innerText =
  localStorage.getItem("userName");

// 🚀 Submit (connected to backend)
async function handleCheckin() {

  const selects = document.querySelectorAll("select");
  const answers = [];

  selects.forEach(s => answers.push(s.value));

  // 🧠 Simple conversion for backend (optional)
  const stress = answers[2] === "Often" || answers[2] === "Always" ? 4 : 2;
  const sleep = 6; // default since no direct input now
  const focus = answers[7] === "Often" ? 4 : 2;
  const mood = "Survey Submitted";

  const data = await submitCheckin(stress, sleep, focus, mood);

  if (data.sessionId) {
    alert("Check-in submitted successfully!");
  } else {
    alert("Error: " + (data.error || "Something went wrong"));
  }
}

// 🔓 Logout
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>
