<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>MindCare</h2>
        <ul>
            <li><a href="counsellor.html">Dashboard</a></li>
            <li><a href="students.html">Students</a></li>
            <li><a href="index.html">Home</a></li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <h1>Student Details</h1>

        <div class="checkin-box">

            <p><strong>Student ID:</strong> <span id="studentId"></span></p>
            <p><strong>Status:</strong> <span id="status"></span></p>
            <p><strong>Last Check-in:</strong> Today</p>
            <p><strong>Stress Level:</strong> 3</p>
            <p><strong>Sleep:</strong> 6 hours</p>
            <p><strong>Focus:</strong> 4</p>
            <p><strong>Mood:</strong> 😐 Neutral</p>

        </div>

    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

document.getElementById("studentId").innerText = id;

// Dummy status logic
if (id === "S002") {
    document.getElementById("status").innerText = "Alert";
    document.getElementById("status").style.color = "red";
} else {
    document.getElementById("status").innerText = "Normal";
    document.getElementById("status").style.color = "green";
}
</script>

</body>
</html>
