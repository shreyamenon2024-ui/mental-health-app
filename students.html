<!DOCTYPE html>
<html>
<head>
  <title>Students</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>MindCare</h2>
    <ul>
      <li><a href="counsellor.html">Dashboard</a></li>
      <li><a href="students.html">Students</a></li>
      <li><a href="index.html">Home</a></li>
    </ul>
  </div>
  <div class="main">
    <h1>All Students</h1>
    <table>
      <tr>
        <th>Student</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      <tbody id="student-list">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="api.js"></script>
<script>
async function loadStudents() {
  const tbody = document.getElementById('student-list');

  const openData = await getOpenSessions();
  const myData = await getMyCounsellorSessions();

  const openSessions = (openData.sessions || []).map(s => ({...s, mine: false}));
  const mySessions = (myData.sessions || []).map(s => ({...s, mine: true}));

  const allSessions = [...openSessions, ...mySessions];

  if (allSessions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3">No students yet.</td></tr>';
    return;
  }

  tbody.innerHTML = allSessions.map(s => `
    <tr>
      <td>${s.student_name}</td>
      <td style="color:${s.status === 'open' ? 'orange' : s.status === 'in_progress' ? 'green' : 'gray'};">
        ${s.status}
      </td>
      <td>
        ${!s.mine
          ? `<button onclick="handleClaim(${s.id})">Claim</button>`
          : `<a href="student-detail.html?id=${s.id}">View</a>`
        }
      </td>
    </tr>
  `).join('');
}

async function handleClaim(sessionId) {
  const data = await claimSession(sessionId);
  if (data.message) {
    alert("Session claimed!");
    loadStudents();
  } else {
    alert("Error: " + (data.error || "Something went wrong"));
  }
}

loadStudents();
</script>

</body>
</html>
