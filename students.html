<!DOCTYPE html>
<html>
<head>
  <title>Students</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>MindCare</h2>
    <ul>
      <li><a href="counsellor.html">Dashboard</a></li>
      <li><a href="students.html">Students</a></li>
      <li><a href="index.html">Home</a></li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">
    <h1>Assigned Students</h1>
    <table>
      <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      <tbody id="student-list">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="api.js"></script>
<script>
async function loadStudents() {
  const data = await getMyCounsellorSessions();
  const sessions = data.sessions || [];
  const tbody = document.getElementById('student-list');

  if (sessions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3">No students assigned yet.</td></tr>';
    return;
  }

  tbody.innerHTML = sessions.map(s => `
    <tr>
      <td>${s.student_name}</td>
      <td style="color:${s.status === 'open' ? 'orange' : s.status === 'in_progress' ? 'green' : 'gray'};">
        ${s.status}
      </td>
      <td><a href="student-detail.html?id=${s.id}">View</a></td>
    </tr>
  `).join('');
}

loadStudents();
</script>

</body>
</html>
