<!DOCTYPE html>
<html>
<head>
    <title>Student Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 PROTECTION -->
<script>
const isLoggedIn = localStorage.getItem("loggedIn");
if (!isLoggedIn) {
    window.location.href = "login.html";
}
</script>

<div class="main center">

    <h1>Daily Check-in 🌿</h1>
    <p>Welcome, <span id="username"></span></p>

    <div class="checkin-box">

        <div class="form-group">
            <label>Stress Level</label>
            <select>
                <option>1 😌</option>
                <option>2 🙂</option>
                <option>3 😐</option>
                <option>4 😟</option>
                <option>5 😣</option>
            </select>
        </div>

        <div class="form-group">
            <label>Sleep Hours</label>
            <input type="number">
        </div>

        <div class="form-group">
            <label>Focus Level</label>
            <select>
                <option>1 😴</option>
                <option>2 😕</option>
                <option>3 😐</option>
                <option>4 🙂</option>
                <option>5 🔥</option>
            </select>
        </div>

        <div class="form-group">
            <label>Mood</label>
            <input type="text">
        </div>

        <button onclick="handleCheckin()">Submit</button>

    </div>

    <br>
    <button onclick="logout()">Logout</button>

</div>

<script>
document.getElementById("username").innerText =
    localStorage.getItem("userName");

async function loadStudents() {
  const tbody = document.getElementById('student-list');
  
  // Get both open and assigned sessions
  const openData = await getOpenSessions();
  const myData = await getMyCounsellorSessions();
  
  const openSessions = openData.sessions || [];
  const mySessions = myData.sessions || [];
  
  // Combine both lists
  const allSessions = [...openSessions, ...mySessions];

  if (allSessions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3">No students yet.</td></tr>';
    return;
  }

  tbody.innerHTML = allSessions.map(s => `
    <tr>
      <td>${s.student_name}</td>
      <td style="color:${s.status === 'open' ? 'orange' : s.status === 'in_progress' ? 'green' : 'gray'};">
        ${s.status}
      </td>
      <td>
        ${s.status === 'open' 
          ? `<button onclick="claimSession(${s.id})">Claim</button>` 
          : `<a href="student-detail.html?id=${s.id}">View</a>`}
      </td>
    </tr>
  `).join('');
}

function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("userName");
    localStorage.removeItem("userRole");
    window.location.href = "login.html";
}
</script>
<script src="api.js"></script>
</body>
</html>
